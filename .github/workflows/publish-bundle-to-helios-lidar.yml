#  Auto-publish the freshly-built helios.js bundle to helios-lidar.org
#  every time a release is published on this repo. The site embeds a
#  live demo card on /, and the demo loads the bundle from
#  /static/helios-card-bundle.js (served by nginx from the site's
#  /var/helios-lidar/frontend dir). Without this workflow, the site
#  stays pinned to whatever bundle was uploaded last and visitors
#  test against a stale card version.
#
#  Trigger: release.published. GitHub fires this event for both
#  full releases and prereleases, so any alpha / beta we ship lands
#  on the site within minutes. Per the project plan, this stays as
#  the trigger during the 1.7.0 prerelease cycle; once 1.7.0 stable
#  ships we'll narrow the filter to non-prerelease only by adding a
#  conditional on github.event.release.prerelease.
#
#  Secrets required on the repo:
#    HELIOS_LIDAR_HOST      VPS hostname or IPv4 (37.59.122.223)
#    HELIOS_LIDAR_USER      SSH user (reikan)
#    HELIOS_LIDAR_PASSWORD  SSH + sudo password for that user

name: Publish helios.js bundle to Helios-Lidar

on:
  release:
    types: [published]
  #  Manual trigger so we can republish without cutting a new tag,
  #  useful when only the VPS files are stale (e.g., after a server
  #  restore) and the bundle on the latest release is what we want.
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. v1.7.0-alpha.22). Defaults to the latest release.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName --jq .tagName)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Download helios.js from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'helios.js' \
            --output helios-card-bundle.js
          ls -la helios-card-bundle.js
          #  Sanity check: an empty or HTML-error download would
          #  silently overwrite the bundle on the site. A real
          #  Helios bundle is multi-megabyte and starts with the
          #  generated module header.
          if [ ! -s helios-card-bundle.js ]; then
            echo "Downloaded bundle is empty, aborting" >&2
            exit 1
          fi
          SIZE=$(stat -c%s helios-card-bundle.js)
          if [ "$SIZE" -lt 100000 ]; then
            echo "Downloaded bundle is suspiciously small ($SIZE bytes), aborting" >&2
            exit 1
          fi

      - name: SCP bundle to Helios-Lidar VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.HELIOS_LIDAR_HOST }}
          username: ${{ secrets.HELIOS_LIDAR_USER }}
          password: ${{ secrets.HELIOS_LIDAR_PASSWORD }}
          source:   'helios-card-bundle.js'
          target:   '/tmp/'
          overwrite: true

      - name: Move bundle into both frontend dirs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.HELIOS_LIDAR_HOST }}
          username: ${{ secrets.HELIOS_LIDAR_USER }}
          password: ${{ secrets.HELIOS_LIDAR_PASSWORD }}
          script: |
            set -e
            echo '${{ secrets.HELIOS_LIDAR_PASSWORD }}' | sudo -S cp /tmp/helios-card-bundle.js /var/helios-lidar/frontend/helios-card-bundle.js
            echo '${{ secrets.HELIOS_LIDAR_PASSWORD }}' | sudo -S cp /tmp/helios-card-bundle.js /var/helios-lidar/app/frontend/helios-card-bundle.js
            rm -f /tmp/helios-card-bundle.js
            ls -la /var/helios-lidar/frontend/helios-card-bundle.js
            ls -la /var/helios-lidar/app/frontend/helios-card-bundle.js
