name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      #npm ci is strict — fails if package-lock.json is out of sync.
      #We use npm install instead so a fresh checkout always builds.
      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Solar math tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify HACS-compatible artifact
        run: |
          if [ ! -f dist/helios.js ]; then
            echo "::error::Expected dist/helios.js not found — HACS will not be able to find the plugin"
            ls -la dist/ || true
            exit 1
          fi
          echo "::notice::Build artifact: $(stat -c%s dist/helios.js) bytes"